<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Compressor | Secure & Fast</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2rem; }

        /* File Input Styling */
        #fileInput { display: none; }

        .upload-area {
            border: 2px dashed #334155;
            padding: 2.5rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin-bottom: 1.5rem;
        }

        .upload-area:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 0.8rem;
        }

        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3); }

        .btn-reset { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-reset:hover { background: #334155; color: white; }

        /* Comparison Dashboard */
        .stats-box {
            background: rgba(15, 23, 42, 0.4);
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-line { display: flex; justify-content: space-between; margin-bottom: 0.6rem; font-size: 0.9rem; }
        .stat-val { font-family: monospace; color: var(--text); font-weight: bold; }
        
        .savings-badge { 
            display: block; 
            background: rgba(34, 197, 94, 0.2); 
            color: var(--success); 
            padding: 0.5rem; 
            border-radius: 0.5rem; 
            font-weight: 800; 
            text-align: center; 
            margin-top: 1rem;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">⚡ ProCompress</div>
    <p>Local, private, and instant.</p>

    <div id="step-1">
        <label for="fileInput" class="upload-area">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">🖼️</div>
            <div id="file-name">Click to select File</div>
            <span style="font-size: 0.7rem; color: #64748b;">JPG, PNG, or JSON</span>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,application/json">
        </label>
        <button class="btn-primary" onclick="handleProcess()">Compress File</button>
    </div>

    <div id="step-2" class="hidden">
        <div class="stats-box">
            <div class="stat-line"><span>Original Size:</span> <span id="old-size" class="stat-val">-</span></div>
            <div class="stat-line"><span>New Size:</span> <span id="new-size" class="stat-val">-</span></div>
            <div id="savings-percent" class="savings-badge">Saved 0%</div>
        </div>
        
        <button class="btn-primary" id="download-btn">Download Compressed File</button>
        <button class="btn-reset" onclick="location.reload()">Reset & Start Over</button>
    </div>

    <div id="loading" class="hidden" style="color: var(--accent); font-weight: bold; margin-top: 10px;">Processing...</div>
</div>

<script>
    let finalBlob = null;
    let fileName = "";

    // Update label when file is picked
    document.getElementById('fileInput').onchange = function(e) {
        if(e.target.files[0]) {
            document.getElementById('file-name').innerText = e.target.files[0].name;
            document.getElementById('file-name').style.color = "#38bdf8";
        }
    };

    async function handleProcess() {
        const input = document.getElementById('fileInput');
        const file = input.files[0];

        if (!file) return alert("Please select a file first!");

        fileName = file.name;
        document.getElementById('loading').classList.remove('hidden');

        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    // Compress to 0.7 quality while keeping original format
                    canvas.toBlob((blob) => {
                        displayResults(file.size, blob);
                    }, file.type, 0.7);
                };
            };
        } else if (file.type === "application/json") {
            const text = await file.text();
            try {
                const minified = JSON.stringify(JSON.parse(text));
                const blob = new Blob([minified], { type: "application/json" });
                displayResults(file.size, blob);
            } catch(e) {
                alert("Invalid JSON file!");
                location.reload();
            }
        }
    }

    function displayResults(oldSize, newBlob) {
        finalBlob = newBlob;
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');

        document.getElementById('old-size').innerText = (oldSize / 1024).toFixed(2) + " KB";
        document.getElementById('new-size').innerText = (newBlob.size / 1024).toFixed(2) + " KB";
        
        const diff = Math.round(((oldSize - newBlob.size) / oldSize) * 100);
        document.getElementById('savings-percent').innerText = `🔥 Reduced by ${diff}%`;

        document.getElementById('download-btn').onclick = () => {
            const url = URL.createObjectURL(finalBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "compressed_" + fileName;
            a.click();
        };
    }
</script>

</body>
</html>
